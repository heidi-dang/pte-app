services:
  postgres:
    image: postgres:17-alpine
    container_name: pte-postgres
    env_file: .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal
    expose:
      - 5432

  redis:
    image: redis:7-alpine
    container_name: pte-redis
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal
    expose:
      - 6379

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: runner
    container_name: pte-api
    env_file: .env.production
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: production
    command: ["node", "services/api/dist/main.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - internal
      - caddy
    expose:
      - 4000

  scoring:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: runner
    container_name: pte-scoring
    env_file: .env.production
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: production
    command: ["node", "services/scoring/dist/main.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - internal
    expose:
      - 5000

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: runner
    container_name: pte-worker
    env_file: .env.production
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: production
    command: ["node", "services/worker/dist/main.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: runner
    container_name: pte-web
    env_file: .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
    command: ["node", "apps/web/.next/standalone/apps/web/server.js"]
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - internal
      - caddy
    expose:
      - 3000

  caddy:
    image: caddy:2-alpine
    container_name: pte-caddy
    env_file: .env.production
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - api
    restart: unless-stopped
    networks:
      - caddy

networks:
  internal:
    internal: true
  caddy:

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
