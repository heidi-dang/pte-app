name: Phase A Documentation Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare environment
        run: cp .env.example .env.local

      - name: Run Phase A documentation validation
        run: npm run test:docs && npm run validate:docs && npm run validate:workspace

      - name: Build and run tooling/unit tests
        run: npm run build && npm run test:tooling && npm run test:unit
