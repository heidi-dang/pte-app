name: Phase A Documentation Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      PG_REQUIRED: 'true'

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: pte_app
          POSTGRES_USER: pte_app
          POSTGRES_PASSWORD: local_dev_password_only
        options: >-
          --health-cmd "pg_isready -U pte_app -d pte_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set up environment
        run: |
          cp .env.example .env.local
          cp .env.production.test .env.production

      - name: Run complete Phase A test gate
        run: npm test
