name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: node --check scripts/local-up.mjs
      - run: node --check scripts/local-down.mjs
      - run: node --check scripts/local-smoke.mjs
      - run: cp .env.example .env.local
      - run: npm run generate:pte-blueprints
      - run: node scripts/generate-pte-blueprints.mjs --validate
      - run: npm run ci
      - name: Docker lifecycle verification
        run: |
          npm run local:up &
          UP_PID=\$!
          for i in \$(seq 1 30); do
            if curl -s http://127.0.0.1:4000/health/live &>/dev/null; then
              echo "API ready after \${i}s"
              break
            fi
            sleep 2
          done
          curl -s http://127.0.0.1:5000/health/live
          curl -s -o /dev/null -w "Web: HTTP %{http_code}\n" http://127.0.0.1:3000
          npm run local:down
        if: always()
      - run: git diff --check
      - name: Fail on tracked file changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: Tests or generation modified tracked files"
            git diff --stat
            exit 1
          fi
