name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: node --check scripts/local-up.mjs
      - run: node --check scripts/local-down.mjs
      - run: node --check scripts/local-smoke.mjs
      - run: cp .env.example .env.local
      - run: npm run generate:pte-blueprints
      - run: node scripts/generate-pte-blueprints.mjs --validate
      - run: npm run ci
      - name: Docker lifecycle verification
        run: |
          # Wait for compose services to be available
          docker compose --env-file .env.local up -d
          for i in $(seq 1 15); do
            if docker compose --env-file .env.local exec -T postgres pg_isready &>/dev/null; then
              echo "PostgreSQL ready after ${i}s"
              break
            fi
            sleep 2
          done
          for i in $(seq 1 15); do
            if docker compose --env-file .env.local exec -T redis redis-cli ping &>/dev/null; then
              echo "Redis ready after ${i}s"
              break
            fi
            sleep 2
          done
          # Start node services and verify
          npx tsx services/api/src/main.ts &
          npx tsx services/scoring/src/main.ts &
          for i in $(seq 1 15); do
            if curl -s http://127.0.0.1:4000/health/live &>/dev/null; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 2
          done
          curl -s http://127.0.0.1:4000/health/live
          curl -s http://127.0.0.1:4000/health/ready
          curl -s http://127.0.0.1:5000/health/live
          curl -s http://127.0.0.1:5000/health/ready
          # Cleanup
          kill %1 %2 2>/dev/null || true
          docker compose --env-file .env.local down
        if: always()
      - run: git diff --check
      - name: Fail on tracked file changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: Tests or generation modified tracked files"
            git diff --stat
            exit 1
          fi
