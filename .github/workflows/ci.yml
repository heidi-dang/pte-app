name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: node --check scripts/local-up.mjs
      - run: node --check scripts/local-down.mjs
      - run: node --check scripts/local-smoke.mjs
      - run: cp .env.example .env.local
      - run: npm run generate:pte-blueprints
      - run: node scripts/generate-pte-blueprints.mjs --validate
      - run: npm run format:check && npm run lint && npm run typecheck && npm test && npm run build && npm run validate:workspace

      - name: Start local environment
        run: |
          npm run local:up &
          UP_PID=$!
          # Wait for all services to be ready (timeout 120s)
          ready=false
          for i in $(seq 1 60); do
            if curl -s http://127.0.0.1:4000/health/live &>/dev/null && \
               curl -s http://127.0.0.1:5000/health/live &>/dev/null && \
               curl -s -o /dev/null http://127.0.0.1:3000 2>/dev/null; then
              echo "All services ready after ${i}s"
              ready=true
              break
            fi
            sleep 2
          done
          if [ "$ready" != "true" ]; then
            echo "FAILED: Services did not become ready"
            kill $UP_PID 2>/dev/null || true
            npm run local:down
            exit 1
          fi
          # Verify all endpoints
          echo "API live:   $(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4000/health/live)"
          echo "API ready:  $(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4000/health/ready)"
          echo "Score live: $(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:5000/health/live)"
          echo "Score ready:$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:5000/health/ready)"
          echo "Web status: $(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000)"
          # Stop infrastructure
          kill $UP_PID 2>/dev/null || true
          npm run local:down

      - name: Run standalone smoke test
        run: npm run local:smoke

      - name: Stop local environment (cleanup)
        if: always()
        run: npm run local:down

      - name: Verify cleanup
        if: always()
        run: |
          if docker compose --env-file .env.local ps -q | grep -q .; then
            echo "ERROR: containers remain"
            docker compose --env-file .env.local ps
            exit 1
          fi
          if test -f .local-runtime/pids.json; then
            echo "ERROR: PID state remains"
            exit 1
          fi
          git diff --check
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: tracked files changed"
            git diff --stat
            exit 1
          fi
