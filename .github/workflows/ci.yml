name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: ${{ vars.NODE_VERSION || '24' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run generate:pte-blueprints
      - run: node scripts/generate-pte-blueprints.mjs --validate
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:docs
      - run: npm run validate:docs
      - run: npm run validate:workspace
      - run: npm run test:tooling
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm test
      - run: npm run build
      - run: git diff --check
      - name: Fail on tracked file changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: Tests or generation modified tracked files"
            git diff --stat
            exit 1
          fi
