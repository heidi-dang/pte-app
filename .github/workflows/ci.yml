name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run generate:pte-blueprints
      - run: node scripts/generate-pte-blueprints.mjs --validate
      - run: npm run ci
      - run: git diff --check
      - name: Fail on tracked file changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: Tests or generation modified tracked files"
            git diff --stat
            exit 1
          fi
