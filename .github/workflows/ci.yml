name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      PG_REQUIRED: 'true'

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: pte_app
          POSTGRES_USER: pte_app
          POSTGRES_PASSWORD: local_dev_password_only
        options: >-
          --health-cmd "pg_isready -U pte_app -d pte_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: node --check scripts/local-up.mjs
      - run: node --check scripts/local-down.mjs
      - run: node --check scripts/local-smoke.mjs
      - run: cp .env.example .env.local
      - run: npm run generate:pte-blueprints
      - run: node scripts/generate-pte-blueprints.mjs --validate
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:docs
      - run: npm run validate:docs
      - run: npm run test:tooling
      - run: npm run test:unit
      - run: npm run test:integration
      - run: npm run test:api
      - run: npm run test:e2e
      - run: npm run build
      - run: npm run validate:workspace
      - run: git diff --check
      - name: Fail on tracked file changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "ERROR: Tests or generation modified tracked files"
            git diff --stat
            exit 1
          fi
